name: generate contribution calendar

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: generate svg
        run: node generate-contribution-calendar.js

      - name: commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution calendar"
          file_pattern: assets/contribution-calendar.svg
